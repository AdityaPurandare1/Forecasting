<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procurement Forecast Engine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0c0f14;
      --bg-secondary: #12161e;
      --bg-tertiary: #1a1f2b;
      --bg-card: #161b26;
      --bg-elevated: #1e2433;
      --text-primary: #e8ecf4;
      --text-secondary: #8a94a8;
      --text-tertiary: #5a6478;
      --border: #252d3d;
      --border-hover: #3a4560;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.15);
      --accent-soft: rgba(59, 130, 246, 0.08);
      --success: #22c55e;
      --success-bg: rgba(34, 197, 94, 0.08);
      --success-text: #4ade80;
      --info: #38bdf8;
      --info-bg: rgba(56, 189, 248, 0.08);
      --info-text: #7dd3fc;
      --warn: #f59e0b;
      --warn-bg: rgba(245, 158, 11, 0.08);
      --warn-text: #fbbf24;
      --danger: #ef4444;
      --danger-text: #f87171;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', -apple-system, sans-serif;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --gradient-accent: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --gradient-surface: linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
    }

    body {
      font-family: var(--sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 600px;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    ::selection { background: rgba(59,130,246,0.3); }

    input, select, textarea {
      font-family: var(--sans);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef, useEffect } = React;

    // ─── Constants ───────────────────────────────────────────────
    const SERVICE_LEVEL_Z = 1.65;
    const SS_DAYS = { FAST: 7, MED: 14, SLOW: 7 };
    const HW = { alpha: 0.3, beta: 0.1, gamma: 0.3, m: 4 };
    const CAT = { PAR: "PAR", SEASONAL: "SEASONAL", EVENT: "EVENT", FIRST_TIME: "FIRST_TIME", UNIFORM: "UNIFORM" };
    const CAT_LABELS = { PAR: "PAR Attrition", SEASONAL: "Seasonal (Holt-Winters)", EVENT: "Event / Override", FIRST_TIME: "First-Time Buy", UNIFORM: "Uniform / One-Time Order" };

    // ─── CSV Parsing ─────────────────────────────────────────────
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];
      const headers = lines[0].split(",").map(h => h.trim());
      return lines.slice(1).map(line => {
        const vals = [];
        let cur = "", inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { inQ = !inQ; }
          else if (c === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
          else { cur += c; }
        }
        vals.push(cur.trim());
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] || ""; });
        return obj;
      });
    }

    function readFile(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = () => rej(r.error);
        r.readAsText(file);
      });
    }

    // ─── Date Helpers ────────────────────────────────────────────
    function monthKey(y, m) { return `${String(y).padStart(4, "0")}-${String(m).padStart(2, "0")}`; }
    function advMonth(y, m, n) { m += n; while (m > 12) { y++; m -= 12; } while (m < 1) { y--; m += 12; } return [y, m]; }
    function getTargetMonths(n) {
      const d = new Date(); let y = d.getFullYear(), m = d.getMonth() + 1;
      return Array.from({ length: n }, (_, i) => { const [ny, nm] = advMonth(y, m, i); return monthKey(ny, nm); });
    }
    function fmtMonthLabel(mk) {
      const [y, m] = mk.split("-").map(Number);
      return ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][m - 1] + " " + y;
    }

    // ─── Math Engine ─────────────────────────────────────────────
    function classifyVelocity(avg) { return avg > 15 ? "FAST" : avg > 5 ? "MED" : "SLOW"; }

    function computeParForecast(parRows, occRows, months) {
      const occLookup = {};
      occRows.forEach(r => {
        const d = new Date(r["Month"]);
        if (isNaN(d)) return;
        const k = `${r["Property"].trim()}|${monthKey(d.getFullYear(), d.getMonth() + 1)}`;
        occLookup[k] = parseFloat(r["Occupancy Rate"]) || 0;
      });
      const out = {};
      parRows.forEach(r => {
        const sku = (r["SKU"] || "").trim().toUpperCase();
        const prop = (r["Property"] || "").trim();
        const par = parseFloat(r["PAR"]) || 0;
        const attr = parseFloat(r["Attrition Rate"]) || 0;
        const baseOcc = parseFloat(r["Baseline Occupancy"]) || 0;
        if (!sku || par <= 0 || attr <= 0 || baseOcc <= 0) return;
        if (!out[sku]) out[sku] = {};
        months.forEach(mk => {
          const occ = occLookup[`${prop}|${mk}`] ?? baseOcc;
          const need = par * attr * (occ / baseOcc);
          out[sku][mk] = (out[sku][mk] || 0) + need;
        });
      });
      return out;
    }

    function hwInit(series, m) {
      const n = series.length;
      if (n < m) { const avg = n > 0 ? series.reduce((a, b) => a + b, 0) / n : 0; return [avg, 0, Array(m).fill(1)]; }
      const fc = series.slice(0, m);
      const L0 = fc.reduce((a, b) => a + b, 0) / m;
      let T0 = 0;
      if (n >= 2 * m) { const sc = series.slice(m, 2 * m); T0 = fc.reduce((s, _, i) => s + (sc[i] - fc[i]) / m, 0) / m; }
      const S = fc.map(v => L0 > 0 ? Math.max(v / L0, 0.01) : 1);
      return [L0, T0, S];
    }

    function hwForecast(series, h, m) {
      const n = series.length;
      if (n < m) {
        const avg = n > 0 ? series.reduce((a, b) => a + b, 0) / n : 0;
        return { forecast: Array(h).fill(avg), method: "simple_average" };
      }
      let [L, Tr, Sinit] = hwInit(series, m);
      const seasonals = [...Sinit];
      for (let t = m; t < n; t++) {
        const y = series[t];
        let sp = seasonals[t - m]; if (sp <= 0) sp = 0.01; if (L <= 0) L = 0.01;
        const Ln = HW.alpha * (y / sp) + (1 - HW.alpha) * (L + Tr);
        const Tn = HW.beta * (Ln - L) + (1 - HW.beta) * Tr;
        const Sn = HW.gamma * (y / Ln) + (1 - HW.gamma) * sp;
        L = Ln; Tr = Tn; seasonals.push(Math.max(Sn, 0.01));
      }
      const forecast = [];
      for (let step = 1; step <= h; step++) {
        const si = seasonals.length - m + ((step - 1) % m);
        const sv = si >= 0 && si < seasonals.length ? seasonals[si] : 1;
        forecast.push(Math.max((L + step * Tr) * sv, 0));
      }
      return { forecast, method: "holt_winters" };
    }

    function buildQuarterly(monthlySeries) {
      const q = [];
      for (let i = 0; i < monthlySeries.length; i += 3) q.push(monthlySeries.slice(i, i + 3).reduce((a, b) => a + b, 0));
      return q;
    }

    function runForecast({ skuMaster, parRows, occRows, salesRows, categoryMap, firstTimeBuys, horizonMonths }) {
      const months = getTargetMonths(horizonMonths);
      const horizonQ = Math.max(1, Math.ceil(horizonMonths / 3));
      const skus = {};
      skuMaster.forEach(r => {
        const sku = (r["SKU"] || "").trim().toUpperCase();
        if (!sku) return;
        skus[sku] = {
          sku, leadTime: parseFloat(r["Lead Time"]) || 14,
          onHand: parseFloat(r["On Hand"]) || 0, onPO: parseFloat(r["On PO"]) || 0,
          ordersPerMonth: parseFloat(r["Orders Per Month"]) || 0, isFirstTime: false,
        };
      });
      firstTimeBuys.forEach(fb => {
        const sku = fb.sku.trim().toUpperCase();
        if (!sku) return;
        skus[sku] = {
          sku, leadTime: fb.leadTime, onHand: fb.onHand, onPO: 0,
          ordersPerMonth: 0, isFirstTime: true, isUniform: fb.isUniform || false,
          expectedDemand: fb.expectedDemand, coverageDays: fb.coverageDays,
          attritionRate: fb.attritionRate || 0.05,
        };
        categoryMap[sku] = fb.isUniform ? CAT.UNIFORM : CAT.FIRST_TIME;
      });
      const parForecast = computeParForecast(parRows, occRows, months);
      const salesBySkuMonth = {};
      const now = new Date();
      const lookbackMonths = 12;
      salesRows.forEach(r => {
        const d = new Date(r["Order Date"]);
        if (isNaN(d)) return;
        const sku = (r["SKU"] || "").trim().toUpperCase();
        const qty = parseFloat(r["Quantity"]) || 0;
        if (!sku || qty <= 0) return;
        const mk = monthKey(d.getFullYear(), d.getMonth() + 1);
        if (!salesBySkuMonth[sku]) salesBySkuMonth[sku] = {};
        salesBySkuMonth[sku][mk] = (salesBySkuMonth[sku][mk] || 0) + qty;
      });
      const startM = advMonth(now.getFullYear(), now.getMonth() + 1, -(lookbackMonths - 1));
      const histMonths = Array.from({ length: lookbackMonths }, (_, i) => { const [y2, m2] = advMonth(startM[0], startM[1], i); return monthKey(y2, m2); });
      const hwForecasts = {};
      Object.keys(salesBySkuMonth).forEach(sku => {
        const series = histMonths.map(mk => salesBySkuMonth[sku]?.[mk] || 0);
        const quarterly = buildQuarterly(series);
        const hw = hwForecast(quarterly, horizonQ, HW.m);
        const monthly = [];
        hw.forecast.forEach(q => { const v = q / 3; monthly.push(v, v, v); });
        hwForecasts[sku] = { monthly: monthly.slice(0, horizonMonths), method: hw.method };
      });
      const histAvg = {};
      Object.entries(salesBySkuMonth).forEach(([sku, mdata]) => {
        const total = histMonths.reduce((s, mk) => s + (mdata[mk] || 0), 0);
        histAvg[sku] = total / lookbackMonths;
      });
      const sigmaMap = {};
      Object.entries(salesBySkuMonth).forEach(([sku, mdata]) => {
        const series = histMonths.map(mk => mdata[mk] || 0);
        const mu = series.reduce((a, b) => a + b, 0) / series.length;
        const variance = series.reduce((s, x) => s + (x - mu) ** 2, 0) / series.length;
        sigmaMap[sku] = Math.sqrt(Math.max(variance, 0)) / 30;
      });
      const results = [];
      const allSkus = new Set([...Object.keys(skus), ...Object.keys(parForecast), ...Object.keys(hwForecasts)]);
      allSkus.forEach(sku => {
        const info = skus[sku] || { sku, leadTime: 14, onHand: 0, onPO: 0, ordersPerMonth: 0, isFirstTime: false };
        const cat = (categoryMap[sku] || CAT.PAR).toUpperCase();
        const monthlyFc = {};
        let method = "none";
        if (cat === CAT.UNIFORM) {
          // Uniforms: initial need is the full quantity, then small attrition replacement ongoing
          const initialNeed = info.expectedDemand || 0;
          const attrRate = info.attritionRate || 0.05;
          const monthlyReplacement = Math.ceil(initialNeed * attrRate);
          months.forEach((mk, i) => {
            monthlyFc[mk] = i === 0 ? initialNeed : monthlyReplacement;
          });
          method = "uniform_order";
        } else if (cat === CAT.FIRST_TIME) {
          const demand = info.expectedDemand || 0;
          months.forEach(mk => { monthlyFc[mk] = demand; });
          method = "first_time_buy";
        } else if (cat === CAT.PAR && parForecast[sku]) {
          months.forEach(mk => { monthlyFc[mk] = parForecast[sku][mk] || 0; });
          method = "par_attrition";
        } else if (cat === CAT.SEASONAL && hwForecasts[sku]) {
          months.forEach((mk, i) => { monthlyFc[mk] = Math.max(hwForecasts[sku].monthly[i] || 0, 0); });
          method = hwForecasts[sku].method;
        } else if (cat === CAT.EVENT) {
          months.forEach(mk => { monthlyFc[mk] = 0; });
          method = "event_override";
        } else {
          const avg = histAvg[sku] || 0;
          months.forEach(mk => { monthlyFc[mk] = avg; });
          method = "historical_average";
        }
        const vals = months.map(mk => monthlyFc[mk] || 0);
        const avgMonthly = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
        const muDaily = avgMonthly / 30;
        const sigmaDaily = sigmaMap[sku] || 0;
        const vel = classifyVelocity(avgMonthly);
        const ssDays = SS_DAYS[vel] || 7;
        const lt = info.leadTime || 14;
        let ssUnits;
        if (sigmaDaily > 0) { ssUnits = Math.ceil(SERVICE_LEVEL_Z * sigmaDaily * Math.sqrt(lt)); }
        else { ssUnits = Math.ceil(muDaily * ssDays); }
        const rop = Math.ceil(muDaily * lt) + ssUnits;
        const position = (info.onHand || 0) + (info.onPO || 0);
        let suggestedQty;
        if (info.isUniform) {
          // For uniforms: order the initial need + a small buffer for attrition during lead time, minus what's on hand
          const initialNeed = info.expectedDemand || 0;
          const attrRate = info.attritionRate || 0.05;
          const ltMonths = lt / 30;
          const attrDuringLT = Math.ceil(initialNeed * attrRate * ltMonths);
          suggestedQty = Math.max(0, Math.ceil(initialNeed + attrDuringLT - position));
        } else if (info.isFirstTime) {
          const gross = Math.ceil(muDaily * (info.coverageDays || 90)) + ssUnits;
          suggestedQty = Math.max(0, gross - Math.ceil(position));
        } else {
          let reviewDays = info.ordersPerMonth > 0 ? Math.ceil(30 / info.ordersPerMonth) : 14;
          const sTarget = rop + Math.ceil(muDaily * reviewDays);
          suggestedQty = Math.max(0, Math.ceil(sTarget - position));
        }
        const demandQty = Math.max(suggestedQty - ssUnits, 0);
        const coverageMonths = avgMonthly > 0 ? Math.round((demandQty / avgMonthly) * 100) / 100 : 0;
        let reorderDate = null;
        if (muDaily > 0) {
          const daysUntilROP = Math.max(0, Math.floor((position - rop) / muDaily));
          const rd = new Date();
          rd.setDate(rd.getDate() + daysUntilROP);
          reorderDate = rd.toISOString().split("T")[0];
        }
        results.push({
          sku, method, velocity: vel, avgMonthly: Math.round(avgMonthly * 100) / 100,
          muDaily: Math.round(muDaily * 10000) / 10000,
          ssUnits, rop, onHand: info.onHand || 0, onPO: info.onPO || 0, position,
          suggestedQty, coverageMonths, reorderDate,
          monthlyForecast: months.map(mk => Math.round((monthlyFc[mk] || 0) * 10) / 10),
          leadTime: lt, isFirstTime: info.isFirstTime || false,
        });
      });
      return { results, months };
    }

    // ─── Export CSV ───────────────────────────────────────────────
    function exportCSV(results, months) {
      const mLabels = months.map(fmtMonthLabel);
      const headers = ["SKU", "Method", "Velocity", "Avg Monthly", "Lead Time", "SS Units", "ROP", "On Hand", "On PO", "Position", "Suggested Qty", "Coverage (Months)", "Reorder Date", ...mLabels];
      const rows = results.map(r => [
        r.sku, r.method, r.velocity, r.avgMonthly, r.leadTime, r.ssUnits, r.rop, r.onHand, r.onPO, r.position, r.suggestedQty, r.coverageMonths, r.reorderDate || "N/A",
        ...r.monthlyForecast
      ]);
      const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "forecast_output.csv"; a.click();
      URL.revokeObjectURL(url);
    }

    // ─── UI Components ───────────────────────────────────────────

    function FileUpload({ label, desc, onData, columns, delay }) {
      const [status, setStatus] = useState(null);
      const [count, setCount] = useState(0);
      const [dragging, setDragging] = useState(false);
      const inputRef = useRef();
      const handleFile = async (file) => {
        try {
          const text = await readFile(file);
          const rows = parseCSV(text);
          onData(rows);
          setCount(rows.length);
          setStatus("ok");
        } catch { setStatus("err"); }
      };
      return (
        <div
          style={{
            background: dragging ? 'var(--accent-soft)' : status === 'ok' ? 'var(--success-bg)' : 'var(--bg-card)',
            border: `1.5px dashed ${dragging ? 'var(--accent)' : status === 'ok' ? 'var(--success)' : 'var(--border)'}`,
            borderRadius: 'var(--radius-lg)',
            padding: '18px 22px',
            cursor: 'pointer',
            transition: 'all 0.25s ease',
            animation: `fadeInUp 0.4s ease ${delay || 0}s both`,
          }}
          onClick={() => inputRef.current?.click()}
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
          onMouseEnter={e => { if (status !== 'ok') e.currentTarget.style.borderColor = 'var(--border-hover)'; }}
          onMouseLeave={e => { if (status !== 'ok') e.currentTarget.style.borderColor = 'var(--border)'; }}
        >
          <input ref={inputRef} type="file" accept=".csv" style={{ display: "none" }} onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0]); }} />
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{
              width: 42, height: 42, borderRadius: 10,
              background: status === "ok" ? 'var(--success-bg)' : 'var(--accent-soft)',
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 18, flexShrink: 0,
              color: status === "ok" ? 'var(--success-text)' : 'var(--accent)',
              border: `1px solid ${status === 'ok' ? 'rgba(34,197,94,0.2)' : 'rgba(59,130,246,0.15)'}`,
            }}>
              {status === "ok" ? "✓" : "↑"}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--text-primary)', letterSpacing: '-0.01em' }}>{label}</div>
              <div style={{ fontSize: 12.5, color: 'var(--text-secondary)', marginTop: 3, lineHeight: 1.4 }}>{desc}</div>
              {columns && <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 4, fontFamily: 'var(--mono)', letterSpacing: '0.02em' }}>{columns}</div>}
            </div>
            {status === "ok" && <span style={{
              fontSize: 12, color: 'var(--success-text)', fontWeight: 600,
              background: 'var(--success-bg)', padding: '4px 10px', borderRadius: 6,
              fontFamily: 'var(--mono)',
            }}>{count} rows</span>}
          </div>
        </div>
      );
    }

    function CategoryMapper({ skuList, categoryMap, onChange }) {
      const [bulkCat, setBulkCat] = useState("");
      const [selected, setSelected] = useState(new Set());
      if (skuList.length === 0) return (
        <div style={{ color: 'var(--text-secondary)', fontSize: 13, padding: 24, textAlign: 'center', background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)' }}>
          Upload SKU Master first to assign categories.
        </div>
      );
      const toggleAll = () => { if (selected.size === skuList.length) setSelected(new Set()); else setSelected(new Set(skuList)); };
      const applyBulk = () => { if (!bulkCat) return; const u = { ...categoryMap }; selected.forEach(s => { u[s] = bulkCat; }); onChange(u); };
      return (
        <div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center", flexWrap: "wrap" }}>
            <select value={bulkCat} onChange={e => setBulkCat(e.target.value)} style={inputStyle}>
              <option value="">Bulk assign...</option>
              {Object.entries(CAT_LABELS).filter(([k]) => k !== "FIRST_TIME").map(([k, v]) => <option key={k} value={k}>{v}</option>)}
            </select>
            <button onClick={applyBulk} style={btnPrimary}>Apply to selected</button>
            <span style={{ fontSize: 12, color: 'var(--text-secondary)', fontFamily: 'var(--mono)' }}>{selected.size} selected</span>
          </div>
          <div style={{ maxHeight: 320, overflowY: "auto", border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', background: 'var(--bg-card)' }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr style={{ background: 'var(--bg-elevated)' }}>
                <th style={thStyleCat}><input type="checkbox" checked={selected.size === skuList.length && skuList.length > 0} onChange={toggleAll} style={{ accentColor: 'var(--accent)' }} /></th>
                <th style={thStyleCat}>SKU</th>
                <th style={thStyleCat}>Forecast method</th>
                <th style={{ ...thStyleCat, textAlign: 'center', width: 80 }}>First-time</th>
              </tr></thead>
              <tbody>{skuList.map((sku, i) => (
                <tr key={sku} style={{ borderTop: '1px solid var(--border)', animation: `slideIn 0.3s ease ${i * 0.02}s both` }}>
                  <td style={{ padding: "8px 12px" }}><input type="checkbox" checked={selected.has(sku)} onChange={() => { const n = new Set(selected); if (n.has(sku)) n.delete(sku); else n.add(sku); setSelected(n); }} style={{ accentColor: 'var(--accent)' }} /></td>
                  <td style={{ padding: "8px 12px", fontFamily: 'var(--mono)', fontWeight: 500, fontSize: 12.5 }}>{sku}</td>
                  <td style={{ padding: "8px 12px" }}>
                    <select value={categoryMap[sku] || CAT.PAR} onChange={e => onChange({ ...categoryMap, [sku]: e.target.value })} style={{ ...inputStyle, width: "100%", fontSize: 12 }}>
                      {Object.entries(CAT_LABELS).filter(([k]) => k !== "FIRST_TIME").map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                    </select>
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "center" }}>
                    <input type="checkbox" checked={categoryMap[sku] === CAT.FIRST_TIME} onChange={e => { const u = { ...categoryMap }; u[sku] = e.target.checked ? CAT.FIRST_TIME : CAT.PAR; onChange(u); }} style={{ accentColor: 'var(--accent)' }} />
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      );
    }

    function FirstTimeBuyForm({ buys, onChange }) {
      const addRow = () => onChange([...buys, { sku: "", expectedDemand: 0, leadTime: 32, onHand: 0, coverageDays: 60, isUniform: true, attritionRate: 0.05 }]);
      const update = (i, field, val) => { const n = [...buys]; n[i] = { ...n[i], [field]: val }; onChange(n); };
      const remove = (i) => onChange(buys.filter((_, j) => j !== i));
      const csvRef = useRef();
      const [csvStatus, setCsvStatus] = useState(null);
      const [csvCount, setCsvCount] = useState(0);

      const handleCSVUpload = async (file) => {
        try {
          const text = await readFile(file);
          const rows = parseCSV(text);
          const parsed = rows.map(r => ({
            sku: (r["SKU"] || "").trim(),
            expectedDemand: parseFloat(r["Expected Monthly Demand"] || r["Initial Need"] || r["Quantity"]) || 0,
            leadTime: parseFloat(r["Lead Time"]) || 32,
            onHand: parseFloat(r["On Hand"]) || 0,
            coverageDays: parseFloat(r["Coverage Days"]) || 60,
            isUniform: (r["Type"] || "uniform").toLowerCase().includes("uniform") ? true : (r["Is Uniform"] || "true").toLowerCase() === "true",
            attritionRate: parseFloat(r["Attrition Rate"]) || 0.05,
          })).filter(r => r.sku);
          if (parsed.length > 0) {
            onChange([...buys, ...parsed]);
            setCsvCount(parsed.length);
            setCsvStatus("ok");
          } else {
            setCsvStatus("err");
          }
        } catch { setCsvStatus("err"); }
      };

      return (
        <div>
          {/* CSV Upload Zone */}
          <div
            style={{
              background: csvStatus === 'ok' ? 'var(--success-bg)' : 'var(--bg-card)',
              border: `1.5px dashed ${csvStatus === 'ok' ? 'var(--success)' : 'var(--border)'}`,
              borderRadius: 'var(--radius-lg)',
              padding: '18px 22px',
              cursor: 'pointer',
              transition: 'all 0.25s ease',
              marginBottom: 16,
            }}
            onClick={() => csvRef.current?.click()}
            onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--accent)'; }}
            onDragLeave={e => { e.currentTarget.style.borderColor = csvStatus === 'ok' ? 'var(--success)' : 'var(--border)'; }}
            onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--border)'; if (e.dataTransfer.files[0]) handleCSVUpload(e.dataTransfer.files[0]); }}
            onMouseEnter={e => { if (csvStatus !== 'ok') e.currentTarget.style.borderColor = 'var(--border-hover)'; }}
            onMouseLeave={e => { if (csvStatus !== 'ok') e.currentTarget.style.borderColor = 'var(--border)'; }}
          >
            <input ref={csvRef} type="file" accept=".csv" style={{ display: "none" }} onChange={e => { if (e.target.files[0]) handleCSVUpload(e.target.files[0]); }} />
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{
                width: 42, height: 42, borderRadius: 10,
                background: csvStatus === "ok" ? 'var(--success-bg)' : 'var(--accent-soft)',
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 18, flexShrink: 0,
                color: csvStatus === "ok" ? 'var(--success-text)' : 'var(--accent)',
                border: `1px solid ${csvStatus === 'ok' ? 'rgba(34,197,94,0.2)' : 'rgba(59,130,246,0.15)'}`,
              }}>
                {csvStatus === "ok" ? "✓" : "↑"}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--text-primary)', letterSpacing: '-0.01em' }}>Upload First-Time / Uniform Buys CSV</div>
                <div style={{ fontSize: 12.5, color: 'var(--text-secondary)', marginTop: 3, lineHeight: 1.4 }}>Drag and drop or click to upload. Uniforms use one-time initial order + attrition replacement.</div>
                <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 4, fontFamily: 'var(--mono)', letterSpacing: '0.02em' }}>SKU, Initial Need, Lead Time, On Hand, Coverage Days, Attrition Rate</div>
              </div>
              {csvStatus === "ok" && <span style={{
                fontSize: 12, color: 'var(--success-text)', fontWeight: 600,
                background: 'var(--success-bg)', padding: '4px 10px', borderRadius: 6,
                fontFamily: 'var(--mono)',
              }}>{csvCount} rows</span>}
            </div>
          </div>

          {buys.length > 0 && (
            <div style={{ overflowX: "auto", border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', background: 'var(--bg-card)' }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ background: 'var(--bg-elevated)' }}>
                  {["SKU", "Initial need", "Lead time (days)", "On hand", "Coverage (days)", "Attrition %", "Uniform", ""].map(h =>
                    <th key={h} style={{ padding: "10px 12px", textAlign: "left", whiteSpace: "nowrap", color: 'var(--text-secondary)', fontWeight: 600, fontSize: 11.5, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{h}</th>
                  )}
                </tr></thead>
                <tbody>{buys.map((b, i) => (
                  <tr key={i} style={{ borderTop: '1px solid var(--border)' }}>
                    <td style={{ padding: "6px 10px" }}><input value={b.sku} onChange={e => update(i, "sku", e.target.value)} placeholder="SKU code" style={{ ...inputStyle, width: "100%", fontFamily: 'var(--mono)', fontWeight: 500 }} /></td>
                    <td style={{ padding: "6px 10px" }}><input type="number" value={b.expectedDemand} onChange={e => update(i, "expectedDemand", parseFloat(e.target.value) || 0)} style={{ ...inputStyle, width: 100, fontFamily: 'var(--mono)' }} /></td>
                    <td style={{ padding: "6px 10px" }}><input type="number" value={b.leadTime} onChange={e => update(i, "leadTime", parseFloat(e.target.value) || 32)} style={{ ...inputStyle, width: 80, fontFamily: 'var(--mono)' }} /></td>
                    <td style={{ padding: "6px 10px" }}><input type="number" value={b.onHand} onChange={e => update(i, "onHand", parseFloat(e.target.value) || 0)} style={{ ...inputStyle, width: 80, fontFamily: 'var(--mono)' }} /></td>
                    <td style={{ padding: "6px 10px" }}><input type="number" value={b.coverageDays} onChange={e => update(i, "coverageDays", parseFloat(e.target.value) || 60)} style={{ ...inputStyle, width: 90, fontFamily: 'var(--mono)' }} /></td>
                    <td style={{ padding: "6px 10px" }}><input type="number" value={Math.round((b.attritionRate || 0.05) * 100)} onChange={e => update(i, "attritionRate", (parseFloat(e.target.value) || 5) / 100)} style={{ ...inputStyle, width: 65, fontFamily: 'var(--mono)' }} min="0" max="100" /></td>
                    <td style={{ padding: "6px 10px", textAlign: "center" }}><input type="checkbox" checked={b.isUniform !== false} onChange={e => update(i, "isUniform", e.target.checked)} style={{ accentColor: 'var(--accent)' }} /></td>
                    <td style={{ padding: "6px 10px" }}>
                      <button onClick={() => remove(i)} style={{
                        background: "none", border: "none", color: 'var(--danger-text)', cursor: "pointer",
                        fontSize: 20, padding: 4, lineHeight: 1, borderRadius: 6, width: 32, height: 32,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        transition: 'background 0.2s',
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = 'rgba(239,68,68,0.1)'}
                      onMouseLeave={e => e.currentTarget.style.background = 'none'}
                      >×</button>
                    </td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
          <div style={{ display: 'flex', gap: 10, marginTop: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <button onClick={addRow} style={{
              padding: "10px 20px", borderRadius: 'var(--radius)',
              border: '1.5px dashed var(--border)', background: "none",
              color: 'var(--accent)', cursor: "pointer", fontSize: 13, fontWeight: 600,
              transition: 'all 0.2s',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.background = 'var(--accent-soft)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'none'; }}
            >+ Add row manually</button>
            {buys.length > 0 && <button onClick={() => onChange([])} style={{
              padding: "10px 20px", borderRadius: 'var(--radius)',
              border: '1.5px solid rgba(239,68,68,0.3)', background: "none",
              color: 'var(--danger-text)', cursor: "pointer", fontSize: 13, fontWeight: 600,
              transition: 'all 0.2s',
            }}
            onMouseEnter={e => { e.currentTarget.style.background = 'rgba(239,68,68,0.08)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'none'; }}
            >Clear all</button>}
          </div>
        </div>
      );
    }

    function MethodBadge({ method }) {
      const m = {
        par_attrition: { bg: 'var(--success-bg)', color: 'var(--success-text)', border: 'rgba(34,197,94,0.2)' },
        holt_winters: { bg: 'var(--info-bg)', color: 'var(--info-text)', border: 'rgba(56,189,248,0.2)' },
        simple_average: { bg: 'var(--info-bg)', color: 'var(--info-text)', border: 'rgba(56,189,248,0.2)' },
        event_override: { bg: 'var(--warn-bg)', color: 'var(--warn-text)', border: 'rgba(245,158,11,0.2)' },
        first_time_buy: { bg: 'rgba(168,85,247,0.08)', color: '#c084fc', border: 'rgba(168,85,247,0.2)' },
        uniform_order: { bg: 'rgba(236,72,153,0.08)', color: '#f472b6', border: 'rgba(236,72,153,0.2)' },
        historical_average: { bg: 'var(--bg-elevated)', color: 'var(--text-secondary)', border: 'var(--border)' },
        none: { bg: 'var(--bg-elevated)', color: 'var(--text-secondary)', border: 'var(--border)' },
      };
      const c = m[method] || m.none;
      return <span style={{
        display: "inline-block", padding: "3px 9px", borderRadius: 6, fontSize: 10.5, fontWeight: 600,
        background: c.bg, color: c.color, whiteSpace: "nowrap",
        border: `1px solid ${c.border}`, letterSpacing: '0.02em', textTransform: 'uppercase',
      }}>{method.replace(/_/g, " ")}</span>;
    }

    function VelocityBadge({ velocity }) {
      const colors = {
        FAST: { bg: 'var(--success-bg)', color: 'var(--success-text)', border: 'rgba(34,197,94,0.2)' },
        MED: { bg: 'var(--warn-bg)', color: 'var(--warn-text)', border: 'rgba(245,158,11,0.2)' },
        SLOW: { bg: 'rgba(239,68,68,0.08)', color: 'var(--danger-text)', border: 'rgba(239,68,68,0.2)' },
      };
      const c = colors[velocity] || colors.SLOW;
      return <span style={{
        display: "inline-block", padding: "3px 8px", borderRadius: 6, fontSize: 10.5, fontWeight: 600,
        background: c.bg, color: c.color, whiteSpace: "nowrap",
        border: `1px solid ${c.border}`, letterSpacing: '0.03em',
      }}>{velocity}</span>;
    }

    function ResultsTable({ results, months }) {
      const [sortCol, setSortCol] = useState("sku");
      const [sortDir, setSortDir] = useState(1);
      const [filter, setFilter] = useState("");
      const toggleSort = (col) => { if (sortCol === col) setSortDir(-sortDir); else { setSortCol(col); setSortDir(1); } };
      const filtered = useMemo(() => {
        let r = results;
        if (filter) r = r.filter(row => row.sku.toLowerCase().includes(filter.toLowerCase()) || row.method.toLowerCase().includes(filter.toLowerCase()));
        return [...r].sort((a, b) => {
          const av = a[sortCol], bv = b[sortCol];
          if (typeof av === "number" && typeof bv === "number") return (av - bv) * sortDir;
          return String(av || "").localeCompare(String(bv || "")) * sortDir;
        });
      }, [results, filter, sortCol, sortDir]);

      const mLabels = months.map(fmtMonthLabel);
      const cols = [
        { key: "sku", label: "SKU", sticky: true },
        { key: "method", label: "Method" },
        { key: "velocity", label: "Velocity" },
        ...mLabels.map((l, i) => ({ key: `m${i}`, label: l, isMonth: true, idx: i })),
        { key: "avgMonthly", label: "Avg Monthly" },
        { key: "ssUnits", label: "SS Units" },
        { key: "rop", label: "ROP" },
        { key: "onHand", label: "On Hand" },
        { key: "onPO", label: "On PO" },
        { key: "position", label: "Position" },
        { key: "suggestedQty", label: "Suggested Qty" },
        { key: "coverageMonths", label: "Coverage (mo)" },
        { key: "reorderDate", label: "Reorder Date" },
      ];

      const thBase = {
        padding: "11px 14px", textAlign: "left", whiteSpace: "nowrap", cursor: "pointer", userSelect: "none",
        fontSize: 11, fontWeight: 600, color: 'var(--text-secondary)', letterSpacing: '0.04em', textTransform: 'uppercase',
        borderBottom: '1.5px solid var(--border)', background: 'var(--bg-elevated)',
        position: "sticky", top: 0, zIndex: 1,
      };

      return (
        <div style={{ animation: 'fadeInUp 0.5s ease both' }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 12, flexWrap: "wrap" }}>
            <div style={{ position: 'relative' }}>
              <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Filter by SKU or method..." style={{
                ...inputStyle, padding: "10px 16px 10px 38px", borderRadius: 'var(--radius)', width: 280,
              }} />
              <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-tertiary)', fontSize: 14 }}>⌕</span>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <span style={{ fontSize: 13, color: 'var(--text-secondary)', fontFamily: 'var(--mono)' }}>{filtered.length} SKUs</span>
              <button onClick={() => exportCSV(results, months)} style={{
                ...btnPrimary,
                background: 'transparent',
                border: '1.5px solid var(--accent)',
                color: 'var(--accent)',
              }}
              onMouseEnter={e => { e.currentTarget.style.background = 'var(--accent)'; e.currentTarget.style.color = '#fff'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--accent)'; }}
              >↓ Export CSV</button>
            </div>
          </div>
          <div style={{
            overflowX: "auto", border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)',
            boxShadow: 'var(--shadow-md)',
          }}>
            <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 1200 }}>
              <thead><tr>
                {cols.map(c => (
                  <th key={c.key} onClick={() => !c.isMonth && toggleSort(c.key)} style={{
                    ...thBase,
                    ...(c.sticky ? { position: "sticky", left: 0, zIndex: 3, background: 'var(--bg-elevated)' } : {}),
                    ...(c.isMonth ? { background: 'var(--accent-soft)', color: 'var(--accent)', cursor: "default" } : {}),
                  }}>
                    {c.label}{sortCol === c.key ? (sortDir === 1 ? " ↑" : " ↓") : ""}
                  </th>
                ))}
              </tr></thead>
              <tbody>
                {filtered.map((r, ri) => {
                  const rowBg = ri % 2 === 0 ? "transparent" : 'var(--bg-secondary)';
                  return (
                    <tr key={r.sku} style={{ transition: 'background 0.15s' }}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-soft)'}
                      onMouseLeave={e => e.currentTarget.style.background = rowBg}
                    >
                      {cols.map(c => {
                        let val;
                        if (c.isMonth) val = r.monthlyForecast[c.idx];
                        else if (c.key === "method") val = <MethodBadge method={r.method} />;
                        else if (c.key === "velocity") val = <VelocityBadge velocity={r.velocity} />;
                        else if (c.key === "reorderDate") val = r.reorderDate || "—";
                        else val = r[c.key];
                        const isNum = typeof val === "number";
                        return (
                          <td key={c.key} style={{
                            padding: "9px 14px", fontSize: 13, whiteSpace: "nowrap",
                            borderBottom: '1px solid var(--border)',
                            color: 'var(--text-primary)',
                            background: c.sticky ? (ri % 2 === 0 ? 'var(--bg-card)' : 'var(--bg-secondary)') : rowBg,
                            ...(c.sticky ? { position: "sticky", left: 0, zIndex: 1, fontFamily: 'var(--mono)', fontWeight: 600, fontSize: 12.5 } : {}),
                            ...(c.isMonth ? { fontFamily: 'var(--mono)', color: 'var(--info-text)', fontSize: 12.5 } : {}),
                            ...(isNum && !c.isMonth ? { fontFamily: 'var(--mono)', fontSize: 12.5 } : {}),
                            ...(c.key === "suggestedQty" ? { fontWeight: 700, color: 'var(--accent)', fontSize: 13 } : {}),
                          }}>
                            {isNum ? val.toLocaleString(undefined, { maximumFractionDigits: 1 }) : val}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
                {filtered.length === 0 && (
                  <tr><td colSpan={cols.length} style={{ padding: 40, textAlign: "center", color: 'var(--text-secondary)', fontSize: 13 }}>No matching SKUs found</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ─── Shared Styles ───────────────────────────────────────────
    const inputStyle = {
      padding: "8px 12px", borderRadius: 'var(--radius)',
      border: '1.5px solid var(--border)', background: 'var(--bg-card)',
      color: 'var(--text-primary)', fontSize: 13, fontFamily: 'var(--sans)',
      outline: 'none', transition: 'border-color 0.2s, box-shadow 0.2s',
    };
    const thStyleCat = {
      padding: "10px 12px", textAlign: "left", color: 'var(--text-secondary)',
      fontWeight: 600, fontSize: 11.5, letterSpacing: '0.04em', textTransform: 'uppercase',
    };
    const btnPrimary = {
      padding: "9px 20px", borderRadius: 'var(--radius)',
      background: 'var(--accent)', color: "#fff", border: "none",
      fontSize: 13, cursor: "pointer", fontWeight: 600,
      transition: 'all 0.2s ease', letterSpacing: '-0.01em',
    };

      const skuList = useMemo(() => {
        const s = new Set();
        skuMaster.forEach(r => { const sku = (r["SKU"] || "").trim().toUpperCase(); if (sku) s.add(sku); });
        return [...s].sort();
      }, [skuMaster]);

        setRunning(true);
        setTimeout(() => {
          const res = runForecast({ skuMaster, parRows, occRows, salesRows, categoryMap, firstTimeBuys, horizonMonths });
          setOutput(res);
          setActiveSection(4);
          setRunning(false);
        }, 400);
      }, [skuMaster, parRows, occRows, salesRows, categoryMap, firstTimeBuys, horizonMonths]);

        { title: "Settings & Run", n: "4", icon: "⚙" },
        { title: "Results", n: "5", icon: "◉" },

        skuMaster.length, 0, firstTimeBuys.filter(b => b.sku).length, 0,

          <div style={{
            padding: "36px 0 28px",
            borderBottom: '1px solid var(--border)',
            marginBottom: 28,

            <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 8 }}>
              <div style={{
                width: 44, height: 44, borderRadius: 12,
                background: 'var(--gradient-accent)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 20, boxShadow: '0 4px 16px rgba(59,130,246,0.25)',
              }}>📊</div>
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 700, margin: 0, letterSpacing: '-0.03em' }}>Procurement Forecast Engine</h1>
                <p style={{ fontSize: 13.5, color: 'var(--text-secondary)', margin: "3px 0 0", letterSpacing: '-0.01em' }}>
                  PAR attrition · Holt-Winters seasonal · Event overrides · Uniform orders · First-time buys
                </p>
              </div>
            </div>
          </div>

          {/* Nav */}
          <div style={{
            display: "flex", gap: 6, marginBottom: 28, flexWrap: "wrap",

          }}>
            {sections.map((s, i) => {

                <button key={i} onClick={() => setActiveSection(i)} style={{
                  padding: "9px 18px", borderRadius: 'var(--radius)',
                  border: `1.5px solid ${active ? 'var(--accent)' : 'var(--border)'}`,

                  boxShadow: active ? '0 0 0 3px var(--accent-glow)' : 'none',
                }}
                onMouseEnter={e => { if (!active) { e.currentTarget.style.borderColor = 'var(--border-hover)'; e.currentTarget.style.background = 'var(--bg-elevated)'; } }}
                onMouseLeave={e => { if (!active) { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'var(--bg-card)'; } }}
                >
                  <span style={{ fontSize: 14, opacity: 0.8 }}>{s.icon}</span>
                  <span>{s.title}</span>
                  {hasData && <span style={{
                    width: 6, height: 6, borderRadius: '50%', background: 'var(--success)',
                    position: 'absolute', top: 6, right: 6,
                  }} />}
                </button>
              );
            })}
          </div>

          {/* Section 1: Upload */}
          {activeSection === 0 && (
            <div style={{ animation: 'fadeInUp 0.4s ease both' }}>
              <SectionHeader title="Upload your CSV files" subtitle="Drag and drop or click to upload. Only SKU Master is required." />
              <div style={{ display: "grid", gap: 12 }}>
                <FileUpload delay={0} label="SKU Master" desc="Core SKU data with inventory positions" columns="SKU, Category, Lead Time, On Hand, On PO, Orders Per Month" onData={rows => { setSkuMaster(rows); const map = {}; rows.forEach(r => { const sku = (r["SKU"] || "").trim().toUpperCase(); const cat = (r["Category"] || "").trim().toUpperCase(); if (sku && Object.keys(CAT).includes(cat)) map[sku] = cat; }); setCategoryMap(prev => ({ ...prev, ...map })); }} />
                <FileUpload delay={0.05} label="PAR Table" desc="Stock levels and attrition rates per property" columns="SKU, Property, PAR, Attrition Rate, Baseline Occupancy" onData={setParRows} />
                <FileUpload delay={0.1} label="Occupancy Forecast" desc="Monthly occupancy rates per property" columns="Property, Month, Occupancy Rate" onData={setOccRows} />
                <FileUpload delay={0.15} label="Sales History (optional)" desc="Historical order data for Holt-Winters" columns="Order Date, SKU, Property, Quantity" onData={setSalesRows} />
              </div>
              <div style={{
                marginTop: 16, padding: '14px 18px',
                background: 'var(--info-bg)', borderRadius: 'var(--radius-lg)',
                fontSize: 13, color: 'var(--info-text)', lineHeight: 1.7,
                border: '1px solid rgba(56,189,248,0.15)',
                animation: 'fadeInUp 0.4s ease 0.2s both',
              }}>
                <strong>Tip:</strong> PAR table enables the PAR Attrition method. Sales History enables Holt-Winters. Occupancy scales PAR forecasts — if omitted, baseline occupancy is used.
              </div>
            </div>
          )}

          {/* Section 2: Category Mapping */}
          {activeSection === 1 && (
            <div style={{ animation: 'fadeInUp 0.4s ease both' }}>
              <SectionHeader title="Assign forecast method per SKU" subtitle="Select SKUs and bulk-assign, or set individually. Check 'First-time' for new items with no history." />
              <CategoryMapper skuList={skuList} categoryMap={categoryMap} onChange={setCategoryMap} />
            </div>
          )}

          {/* Section 3: First-Time Buys */}
          {activeSection === 2 && (
            <div style={{ animation: 'fadeInUp 0.4s ease both' }}>
              <SectionHeader title="First-time & uniform buys" subtitle="Add SKUs with no history. Toggle 'Uniform' for one-time orders — the engine will calculate initial need + attrition replacement instead of flat recurring demand." />
              <FirstTimeBuyForm buys={firstTimeBuys} onChange={setFirstTimeBuys} />
            </div>
          )}

          {/* Section 4: Settings & Run */}
          {activeSection === 3 && (
            <div style={{ animation: 'fadeInUp 0.4s ease both' }}>
              <SectionHeader title="Forecast settings" subtitle="Configure your forecast horizon and review data before running." />
              <div style={{ display: "grid", gap: 16, maxWidth: 480 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', display: "block", marginBottom: 6, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Forecast horizon</label>
                  <select value={horizonMonths} onChange={e => setHorizonMonths(parseInt(e.target.value))} style={{ ...inputStyle, padding: "10px 14px", width: "100%", fontSize: 14 }}>
                    <option value={3}>3 months (1 quarter)</option>
                    <option value={6}>6 months (2 quarters)</option>
                    <option value={9}>9 months (3 quarters)</option>
                    <option value={12}>12 months (4 quarters)</option>
                  </select>
                </div>

                <div style={{
                  padding: 18, background: 'var(--bg-card)', borderRadius: 'var(--radius-lg)',
                  border: '1px solid var(--border)', fontSize: 13, lineHeight: 1.8,
                }}>
                  <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 8 }}>Data summary</div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '6px 24px' }}>
                    <StatPill label="SKUs loaded" value={skuMaster.length} />
                    <StatPill label="PAR rows" value={parRows.length} />
                    <StatPill label="Occupancy rows" value={occRows.length} />
                    <StatPill label="Sales rows" value={salesRows.length} />
                    <StatPill label="First-time buys" value={firstTimeBuys.filter(b => b.sku).length} />
                  </div>
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)', display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                    <MiniTag label="PAR" count={Object.values(categoryMap).filter(v => v === CAT.PAR).length} />
                    <MiniTag label="Seasonal" count={Object.values(categoryMap).filter(v => v === CAT.SEASONAL).length} />
                    <MiniTag label="Event" count={Object.values(categoryMap).filter(v => v === CAT.EVENT).length} />
                    <MiniTag label="Uniform" count={Object.values(categoryMap).filter(v => v === CAT.UNIFORM).length} />
                    <MiniTag label="First-Time" count={Object.values(categoryMap).filter(v => v === CAT.FIRST_TIME).length} />
                  </div>
                </div>

                <button onClick={handleRun} disabled={running} style={{
                  padding: "14px 28px", borderRadius: 'var(--radius-lg)',
                  background: running ? 'var(--bg-elevated)' : 'var(--gradient-accent)',
                  color: "#fff", border: "none", fontSize: 16, cursor: running ? 'wait' : "pointer",
                  fontWeight: 700, width: "100%",
                  boxShadow: running ? 'none' : '0 4px 20px rgba(59,130,246,0.3)',
                  transition: 'all 0.3s ease',
                  letterSpacing: '-0.01em',
                  fontFamily: 'var(--sans)',
                }}
                onMouseEnter={e => { if (!running) e.currentTarget.style.boxShadow = '0 6px 28px rgba(59,130,246,0.45)'; }}
                onMouseLeave={e => { if (!running) e.currentTarget.style.boxShadow = '0 4px 20px rgba(59,130,246,0.3)'; }}
                >
                  {running ? '⟳ Running forecast...' : '▸ Run Forecast'}
                </button>
              </div>
            </div>
          )}

          {/* Section 5: Results */}
          {activeSection === 4 && (
            <div>
              {output ? (
                <>
                  <SectionHeader title="Forecast results" subtitle={`${output.results.length} SKUs forecasted across ${output.months.length} months`} />
                  <ResultsTable results={output.results} months={output.months} />
                </>
              ) : (
                <div style={{
                  textAlign: "center", padding: 64, color: 'var(--text-secondary)',
                  animation: 'fadeInUp 0.4s ease both',
                }}>
                  <div style={{
                    width: 72, height: 72, borderRadius: 20,
                    background: 'var(--bg-card)', border: '1px solid var(--border)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    margin: '0 auto 20px', fontSize: 28,
                  }}>◉</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 6 }}>No results yet</div>
                  <div style={{ fontSize: 13.5, lineHeight: 1.5, maxWidth: 320, margin: '0 auto' }}>Upload data, map categories, and run the forecast to see results here.</div>
                </div>
              )}
            </div>
          )}

          {/* Footer */}
          <div style={{
            marginTop: 48, paddingTop: 20, borderTop: '1px solid var(--border)',
            fontSize: 12, color: 'var(--text-tertiary)', textAlign: 'center',
            animation: 'fadeInUp 0.5s ease 0.3s both',
          }}>
            Procurement Forecast Engine · All calculations run locally in your browser · No data is sent to any server
          </div>
        </div>
      );
    }

    // ─── Helper Components ────────────────────────────────────────
    function SectionHeader({ title, subtitle }) {
      return (
        <div style={{ marginBottom: 18 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, letterSpacing: '-0.02em' }}>{title}</h2>
          {subtitle && <p style={{ fontSize: 13.5, color: 'var(--text-secondary)', margin: 0, lineHeight: 1.5 }}>{subtitle}</p>}
        </div>
      );
    }

    function StatPill({ label, value }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ color: 'var(--text-secondary)', fontSize: 13 }}>{label}</span>
          <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, fontSize: 13, color: value > 0 ? 'var(--text-primary)' : 'var(--text-tertiary)' }}>{value}</span>
        </div>
      );
    }

    function MiniTag({ label, count }) {
      return (
        <span style={{
          fontSize: 12, color: 'var(--text-secondary)', fontFamily: 'var(--mono)',
          background: 'var(--bg-elevated)', padding: '3px 8px', borderRadius: 5,
          border: '1px solid var(--border)',
        }}>{label}: {count}</span>
      );
    }

    // ─── Render ──────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
